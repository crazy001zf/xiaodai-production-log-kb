<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>效贷生产日志速查表</title>
<style>
:root {
  --bg: #f5f6f8;
  --card-bg: #fff;
  --primary: #1677ff;
  --text: #1f1f1f;
  --text-secondary: #666;
  --text-tertiary: #999;
  --border: #e8e8e8;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --radius: 8px;
  --tag-bg: #f0f5ff;
  --tag-color: #2f54eb;
  --copy-bg: #f6ffed;
  --copy-border: #b7eb8f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
}

/* Header */
.header {
  background: #fff;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .badge { 
  font-size: 12px; color: var(--text-secondary); 
  background: var(--tag-bg); padding: 2px 10px; border-radius: 10px;
}

/* Product tabs */
.tabs {
  display: flex;
  gap: 0;
  padding: 12px 24px 0;
  background: #fff;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 8px 20px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text-secondary);
  font-size: 14px;
  transition: all 0.2s;
}
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  font-weight: 500;
}

/* Container */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 24px;
}

/* Quick filter */
.quick-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.quick-filter .pf {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-secondary);
}
.quick-filter .pf:hover { border-color: var(--primary); color: var(--primary); }
.quick-filter .pf.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Group card */
.group {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.group-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  gap: 10px;
  border-bottom: 1px solid transparent;
  transition: background 0.15s;
}
.group-header:hover { background: #fafafa; }
.group.open .group-header { border-bottom-color: var(--border); }
.group-header .arrow {
  transition: transform 0.2s;
  font-size: 12px;
  color: var(--text-tertiary);
}
.group.open .group-header .arrow { transform: rotate(90deg); }
.group-header .gname {
  font-weight: 600;
  font-size: 14px;
}
.group-header .gcount {
  font-size: 12px;
  color: var(--text-tertiary);
  background: #f5f5f5;
  padding: 1px 8px;
  border-radius: 10px;
}
.group-body { display: none; }
.group.open .group-body { display: block; }

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: top;
}
th {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  background: #fafafa;
  white-space: nowrap;
}
th:nth-child(1) { width: 220px; }
th:nth-child(2) { width: auto; }
th:nth-child(3) { width: 80px; text-align: center; }

td:nth-child(1) { font-weight: 500; font-size: 13px; }
td:nth-child(2) { font-family: "SF Mono", "Fira Code", "Consolas", monospace; font-size: 12px; }

/* Severity tag */
.sev {
  display: inline-block;
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 3px;
  font-weight: 500;
  margin-right: 6px;
}
.sev-P0 { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
.sev-P1 { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
.sev-P2 { background: #f0f5ff; color: #2f54eb; border: 1px solid #adc6ff; }
.sev-P3 { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }

/* Copy keyword */
.copy-kw {
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 12px;
  background: #fafafa;
  border: 1px solid #eee;
  padding: 6px 10px;
  border-radius: 4px;
  word-break: break-all;
  line-height: 1.7;
  position: relative;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.copy-kw:hover {
  border-color: var(--primary);
  background: #f0f5ff;
}
.copy-kw.copied {
  border-color: var(--copy-border);
  background: var(--copy-bg);
}
.copy-btn {
  text-align: center;
}
.copy-btn button {
  border: 1px solid var(--border);
  background: #fff;
  padding: 5px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.copy-btn button:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* Search */
.search-box {
  margin-bottom: 16px;
}
.search-box input {
  width: 100%;
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--primary); }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1f1f1f;
  color: #fff;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Empty */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
  font-size: 14px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--text-secondary);
}
.stats-bar span { color: var(--primary); font-weight: 500; }

tr.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🧪 效贷生产日志速查表</h1>
  </div>
  <div class="badge" id="updateTime"></div>
</div>

<div class="tabs" id="productTabs"></div>

<div class="container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索场景 / 关键词 / 接口路径...">
  </div>
  <div class="quick-filter" id="quickFilter"></div>
  <div class="stats-bar" id="statsBar"></div>
  <div id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 数据定义 ====================
// 产品 -> 业务场景分组 -> 条目列表
const DATA = {
  "雨商贷": {
    groups: [
      {
        name: "结算规则",
        items: [
          {
            scene: "结算标识 existCustomer",
            desc: "授信通知同步时 existCustomer 为 true，订单对应「是否结算」为否",
            keywords: '"existCustomer"',
            sev: "P2"
          }
        ]
      },
      {
        name: "产品配置",
        items: [
          {
            scene: "可推荐产品配置",
            desc: "额度测算推荐产品列表：XYD100(小雨点)、ZBYH200(中邦)、DSJR247(大数)、JDFIN100(金蝶金融)、HHXD100(恒慧小贷)",
            keywords: '"credit.quota.recommend.products"',
            sev: "P2"
          }
        ]
      },
      {
        name: "定时任务",
        items: [
          {
            scene: "追加授信标识刷新",
            desc: "批量刷新客户可追加授信状态标识的定时任务",
            keywords: '"updateAddCreditOperableFlagJobHandler"',
            sev: "P2"
          }
        ]
      },
      {
        name: "授信状态码",
        items: [
          {
            scene: "审批中",
            desc: "授信申请进入模型审批阶段",
            keywords: '"PENDING_MODEL_AUDIT"',
            sev: "P1"
          },
          {
            scene: "初审通过",
            desc: "初审通过但需补充资料",
            keywords: '"PENDING_FURTHER_INFO"',
            sev: "P1"
          },
          {
            scene: "审核通过",
            desc: "授信审批最终通过，可进入签约放款流程",
            keywords: '"AUDIT_APPROVE"',
            sev: "P1"
          },
          {
            scene: "放款成功",
            desc: "放款完成，贷款已成功到账",
            keywords: '"LOAN_SUCCESS"',
            sev: "P1"
          }
        ]
      },
      {
        name: "前筛流程",
        items: [
          {
            scene: "调用前筛接口",
            desc: "效贷调用小雨点前置筛选接口",
            keywords: '"[小雨点]新-调用接口" AND "xyd/ignore/company/sendPreScreen" AND {企业名称}',
            sev: "P1"
          },
          {
            scene: "前筛结果回调",
            desc: "小雨点异步回调前筛结果，携带 orderNo 预筛订单号",
            keywords: '"xiaoyudian/callback/preScreen-result" AND "orderNo"',
            sev: "P1"
          }
        ]
      },
      {
        name: "同步授信",
        items: [
          {
            scene: "同步客户信息",
            desc: "效贷同步客户授信信息到小雨点",
            keywords: '"[小雨点]syncCustomerInfo" AND {客户企业名称}\n"saveForCategory" AND {企业名称}',
            sev: "P1"
          },
          {
            scene: "同步结果通知",
            desc: "小雨点回调客户授信申请结果，携带 optStatus 操作状态",
            keywords: '"xiaoyudian/callback/apply-result" AND "optStatus" AND {订单号}',
            sev: "P1"
          },
          {
            scene: "前端状态更新",
            desc: "效贷前端根据授信状态回调更新申请材料页面",
            keywords: '"flow-product/apply/material/stateUpdate" AND "resultMsg"',
            sev: "P2"
          }
        ]
      },
      {
        name: "H5签约",
        items: [
          {
            scene: "获取H5签约链接",
            desc: "效贷调用小雨点获取H5签约页面链接（加密传输）",
            keywords: '"sc-api/sign/xyd/ignore/get/h5" AND 加密前业务参数',
            sev: "P2"
          }
        ]
      },
      {
        name: "放款通知",
        items: [
          {
            scene: "放款结果回调",
            desc: "小雨点回调放款结果，携带 outerOrderNo 外部订单号",
            keywords: '"REQUEST" AND "xiaoyudian/callback/loan-result" AND "outerOrderNo" AND {订单号}',
            sev: "P0"
          }
        ]
      },
      {
        name: "授信审批回调",
        items: [
          {
            scene: "授信审批结果",
            desc: "小雨点回调授信审批结果，携带 outerOrderNo",
            keywords: '"REQUEST" AND "/xiaoyudian/callback/approval-result" AND "outerOrderNo" AND {订单号}',
            sev: "P0"
          },
          {
            scene: "是否可提额",
            desc: "审批回调 canCreditAdjust=1 时可发起提额",
            keywords: '"REQUEST" AND "xiaoyudian/callback/approval-result" AND "canCreditAdjust"',
            sev: "P1"
          },
          {
            scene: "提额结果通知",
            desc: "审批回调 operationType=ADJUST 表示提额操作结果",
            keywords: '"REQUEST" AND "xiaoyudian/callback/approval-result" AND "ADJUST"',
            sev: "P1"
          },
          {
            scene: "是否可追加授信",
            desc: "审批回调 AddCredit.isAddCredit=1 时可追加授信",
            keywords: '"REQUEST" AND "xiaoyudian/callback/approval-result" AND "AddCredit"',
            sev: "P1"
          }
        ]
      },
      {
        name: "还款",
        items: [
          {
            scene: "还款计划通知",
            desc: "小雨点回调还款计划结果",
            keywords: '"xiaoyudian/callback/repayment-result" AND "REQUEST" AND {订单号}',
            sev: "P2"
          },
          {
            scene: "还款完结标识",
            desc: "回调中 paidOff=true 代表该笔贷款已全部还清",
            keywords: '"paidOff"',
            sev: "P2"
          }
        ]
      },
      {
        name: "额度测算征信",
        items: [
          {
            scene: "上上签签约",
            desc: "额度测算签约使用上上签服务，排查签署流程锁占用",
            keywords: '"/fcloud/flow-user/credit/contract/sign" AND "上上签"',
            sev: "P1"
          },
          {
            scene: "凯旋征信查询（锁占用）",
            desc: "身份证签署流程锁被占用，可能存在并发锁冲突",
            keywords: '"kaixuan" AND "身份证签署流程锁已被占用"',
            sev: "P1"
          },
          {
            scene: "凯旋征信短信",
            desc: "征信授权流程中发送短信验证",
            keywords: '"kaixuan" AND "短信"',
            sev: "P2"
          },
          {
            scene: "泾渭云税号查询",
            desc: "通过泾渭云进行税号授权的征信查询",
            keywords: '"kaixuan] query result" AND "授权" AND "泾渭云" AND "税号" AND {企业税号}',
            sev: "P1"
          }
        ]
      }
    ]
  }
};

// ==================== 渲染 ====================
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

let currentProduct = "雨商贷";
let searchTerm = "";
let activeFilter = "全部";

function renderTabs() {
  const tabs = document.getElementById("productTabs");
  tabs.innerHTML = Object.keys(DATA).map(p =>
    `<div class="tab${p === currentProduct ? ' active' : ''}" onclick="switchProduct('${p}')">${p}</div>`
  ).join('');
}

function renderQuickFilter() {
  const data = DATA[currentProduct];
  const filters = ["全部", ...data.groups.map(g => g.name)];
  document.getElementById("quickFilter").innerHTML = filters.map(f =>
    `<div class="pf${f === activeFilter ? ' active' : ''}" onclick="setFilter('${f}')">${f}</div>`
  ).join('');
}

function renderContent() {
  const data = DATA[currentProduct];
  const content = document.getElementById("content");
  
  let groups = data.groups;
  if (activeFilter !== "全部") {
    groups = groups.filter(g => g.name === activeFilter);
  }

  let totalVisible = 0;
  let totalAll = 0;

  const html = groups.map(g => {
    const filteredItems = searchTerm
      ? g.items.filter(item => 
          item.scene.includes(searchTerm) || 
          item.desc.includes(searchTerm) || 
          item.keywords.includes(searchTerm)
        )
      : g.items;
    
    totalAll += g.items.length;
    const visibleCount = filteredItems.length;
    totalVisible += visibleCount;
    
    if (visibleCount === 0 && searchTerm) return '';

    return `
    <div class="group${searchTerm ? ' open' : ''}">
      <div class="group-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="arrow">▶</span>
        <span class="gname">${g.name}</span>
        <span class="gcount">${visibleCount}条</span>
      </div>
      <div class="group-body">
        <table>
          <thead>
            <tr>
              <th>业务场景</th>
              <th>日志搜索关键词</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${filteredItems.map((item, i) => `
            <tr>
              <td>${item.scene}</td>
              <td>
                <div class="copy-kw" onclick="copyKw(this, '${g.name}-${i}')" title="点击复制">${escapeHtml(item.keywords)}</div>
              </td>
              <td class="copy-btn">
                <button onclick="event.stopPropagation(); copyKw(this.parentElement.previousElementSibling.querySelector('.copy-kw'), '${g.name}-${i}')">复制</button>
              </td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  content.innerHTML = html || '<div class="empty">没有匹配的记录</div>';

  // Stats
  document.getElementById("statsBar").innerHTML = `
    共 <span>${totalVisible}</span> 条记录
    ${searchTerm ? ` / 筛选前 ${totalAll} 条` : ''}
  `;

  // Update time
  document.getElementById("updateTime").textContent = `更新：2026-06-25`;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function switchProduct(product) {
  currentProduct = product;
  activeFilter = "全部";
  searchTerm = "";
  document.getElementById("searchInput").value = "";
  renderTabs();
  renderQuickFilter();
  renderContent();
}

function setFilter(filter) {
  activeFilter = filter;
  renderQuickFilter();
  renderContent();
}

function copyKw(el, id) {
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    showToast('✅ 已复制到剪贴板');
    setTimeout(() => el.classList.remove('copied'), 1500);
  });
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

// Search
document.getElementById("searchInput").addEventListener("input", (e) => {
  searchTerm = e.target.value.trim();
  renderContent();
});

// Init
renderTabs();
renderQuickFilter();
renderContent();

// Default: open first group
setTimeout(() => {
  const firstGroup = document.querySelector('.group');
  if (firstGroup && !searchTerm) firstGroup.classList.add('open');
}, 100);
</script>
</body>
</html>
